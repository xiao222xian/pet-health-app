name: Flutter CI

on:
  push:
    branches: [main, develop]
    paths: ['app/**']
  pull_request:
    paths: ['app/**']

jobs:
  analyze:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
