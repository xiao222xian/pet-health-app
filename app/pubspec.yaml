name: app
description: Pet Health App - iOS pet health management with AI consultation
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.0

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.4.9

  # UI
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  fl_chart: ^0.66.0

  # Local notifications
  flutter_local_notifications: ^17.0.0

  # Utilities
  intl: ^0.20.0
  uuid: ^4.3.3
  http: ^1.2.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: false
  generate: true
  assets:
    - assets/logo.png
